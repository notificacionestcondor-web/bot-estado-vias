<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Vías — Transportes Cóndor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #1e293b;
            padding: 28px 24px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .header .sub { color: #64748b; font-size: 14px; margin-top: 4px; }

        .container { max-width: 960px; margin: 0 auto; padding: 24px; }

        /* Status bar */
        .status-bar {
            display: flex; gap: 12px; margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .status-card {
            flex: 1; min-width: 140px;
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            background: #1e293b;
            text-align: center;
        }
        .status-card .value { font-size: 36px; font-weight: 800; }
        .status-card .label {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.06em; color: #64748b; margin-top: 2px;
        }
        .value-alto { color: #ef4444; }
        .value-medio { color: #f59e0b; }
        .value-bajo { color: #22c55e; }
        .value-total { color: #3b82f6; }

        /* Último reporte */
        .last-report {
            background: #1e293b; border-radius: 12px;
            padding: 20px 24px; margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .last-report h2 { font-size: 16px; margin-bottom: 12px; color: #94a3b8; }
        .report-meta { font-size: 13px; color: #64748b; margin-bottom: 16px; }

        /* Novedades list */
        .novedad-item {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #334155;
            background: #0f172a;
        }
        .novedad-item .top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .badge-sm {
            padding: 2px 8px; border-radius: 4px; font-size: 10px;
            font-weight: 700; text-transform: uppercase; color: #fff;
        }
        .bg-alto { background: #dc2626; }
        .bg-medio { background: #f59e0b; }
        .bg-bajo { background: #10b981; }
        .novedad-corredor { font-weight: 700; font-size: 14px; }
        .novedad-estado { font-size: 13px; color: #94a3b8; }
        .novedad-analisis { font-size: 12px; color: #64748b; margin-top: 6px; font-style: italic; }

        /* Historial */
        .historial { margin-top: 32px; }
        .historial h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
        .historial-list a {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: #1e293b;
            border-radius: 8px; margin-bottom: 6px;
            text-decoration: none; color: #e2e8f0;
            border: 1px solid #334155;
            transition: border-color 0.2s;
        }
        .historial-list a:hover { border-color: #3b82f6; }
        .historial-fecha { font-weight: 600; font-size: 14px; }
        .historial-badges { display: flex; gap: 8px; font-size: 12px; }

        .loading { text-align: center; padding: 60px; color: #64748b; }
        .error-msg { text-align: center; padding: 40px; color: #f59e0b; }

        .footer {
            text-align: center; padding: 24px;
            color: #475569; font-size: 12px; margin-top: 40px;
            border-top: 1px solid #1e293b;
        }

        @media (max-width: 600px) {
            .status-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛣️ Estado de Vías</h1>
        <div class="sub">Transportes Cóndor — Monitoreo de Corredores Logísticos</div>
    </div>

    <div class="container">
        <div id="app">
            <div class="loading">Cargando datos del último reporte...</div>
        </div>
    </div>

    <div class="footer">
        Transportes Cóndor te mantiene informado para que programes tu logística con anticipación y seguridad.
    </div>

    <script>
        async function loadData() {
            const app = document.getElementById('app');

            try {
                // Cargar último reporte
                const reporteRes = await fetch('data/ultimo_reporte.json');
                if (!reporteRes.ok) throw new Error('No hay reportes disponibles aún');
                const reporte = await reporteRes.json();

                // Cargar índice
                let indice = { reportes: [] };
                try {
                    const indiceRes = await fetch('data/indice_reportes.json');
                    if (indiceRes.ok) indice = await indiceRes.json();
                } catch (e) {}

                renderDashboard(reporte, indice);

            } catch (err) {
                app.innerHTML = `
                    <div class="error-msg">
                        <p style="font-size:48px;margin-bottom:16px;">📋</p>
                        <h3 style="color:#e2e8f0;margin-bottom:8px;">Aún no hay reportes</h3>
                        <p>El BOT generará el primer reporte en su próxima ejecución programada.</p>
                    </div>
                `;
            }
        }

        function renderDashboard(reporte, indice) {
            const app = document.getElementById('app');
            const r = reporte.resumen;

            let novedadesHtml = '';
            for (const n of reporte.novedades) {
                novedadesHtml += `
                    <div class="novedad-item">
                        <div class="top">
                            <span class="badge-sm bg-${n.nivel_impacto}">${n.nivel_impacto.toUpperCase()}</span>
                            <span class="novedad-corredor">${n.corredor}</span>
                        </div>
                        <div class="novedad-estado">${n.tipo_novedad} — ${n.estado}</div>
                        <div class="novedad-analisis">${n.analisis_impacto}</div>
                    </div>
                `;
            }

            if (!reporte.novedades.length) {
                novedadesHtml = `
                    <div style="text-align:center;padding:40px;color:#64748b;">
                        <p style="font-size:32px;">✅</p>
                        <p>Sin novedades relevantes en este reporte.</p>
                    </div>
                `;
            }

            let historialHtml = '';
            for (const rep of indice.reportes.slice(0, 15)) {
                historialHtml += `
                    <a href="reportes/${rep.archivo}">
                        <div>
                            <span class="historial-fecha">${rep.fecha} — ${rep.hora}</span>
                            <div style="font-size:12px;color:#64748b;margin-top:2px;">${rep.periodo}</div>
                        </div>
                        <div class="historial-badges">
                            ${rep.alto ? `<span class="badge-sm bg-alto">${rep.alto}</span>` : ''}
                            ${rep.medio ? `<span class="badge-sm bg-medio">${rep.medio}</span>` : ''}
                            ${rep.bajo ? `<span class="badge-sm bg-bajo">${rep.bajo}</span>` : ''}
                            <span style="color:#64748b;">${rep.total_novedades} novedades</span>
                        </div>
                    </a>
                `;
            }

            app.innerHTML = `
                <div class="status-bar">
                    <div class="status-card">
                        <div class="value value-total">${reporte.total_novedades}</div>
                        <div class="label">Total novedades</div>
                    </div>
                    <div class="status-card">
                        <div class="value value-alto">${r.alto}</div>
                        <div class="label">Impacto alto</div>
                    </div>
                    <div class="status-card">
                        <div class="value value-medio">${r.medio}</div>
                        <div class="label">Impacto medio</div>
                    </div>
                    <div class="status-card">
                        <div class="value value-bajo">${r.bajo}</div>
                        <div class="label">Impacto bajo</div>
                    </div>
                </div>

                <div class="last-report">
                    <h2>📋 Último Reporte</h2>
                    <div class="report-meta">
                        ${reporte.fecha} — ${reporte.hora} | ${reporte.periodo}
                        ${reporte.archivo_html ? `<br><a href="reportes/${reporte.archivo_html}" style="color:#3b82f6;">Ver boletín completo →</a>` : ''}
                    </div>
                    ${novedadesHtml}
                </div>

                ${indice.reportes.length > 0 ? `
                <div class="historial">
                    <h2>📂 Historial de Reportes</h2>
                    <div class="historial-list">${historialHtml}</div>
                </div>
                ` : ''}
            `;
        }

        loadData();
    </script>
</body>
</html>
